name: Homebrew

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to verify, for example v0.1.0
        required: true

permissions:
  contents: read

jobs:
  verify-formula:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version-file: go.mod

      - name: Verify
        run: ./scripts/ci.sh

      - name: Generate formula
        run: |
          set -euo pipefail

          if [[ -z "${TAG}" ]]; then
            echo "TAG is required" >&2
            exit 1
          fi

          archive_url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          sha256="$(curl -fsSL "${archive_url}" | sha256sum | awk '{print $1}')"

          mkdir -p Formula
          ./scripts/generate-homebrew-formula.sh \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${TAG}" \
            --sha256 "${sha256}" \
            > Formula/codexclaw.rb

      - name: Show formula
        run: |
          set -euo pipefail
          cat Formula/codexclaw.rb
